# ============ 用户信息 ============
user:
  name: "李天宇"
  nickname: "老李"
  risk_preference: "平衡型"  # 稳健型/平衡型/激进型
  investment_horizon: "长期"  # 短期/中期/长期
  max_drawdown: 50  # 可接受最大回撤（%）
  total_capital: 150000  # 总资金（元）

# ============ 交易规则 ============
trading_rules:
  min_trade_amount: 1000  # 最小交易金额（元）
  min_return_threshold: 5  # 最小调仓收益阈值（%），低于此值不建议操作
  short_term_days: 7  # 短期持有天数（持有少于此天数不建议卖出）
  emergency_threshold: 10  # 紧急调仓阈值（单日跌幅超过此值触发提醒）
  max_position_ratio: 30  # 单一标的最大仓位（%）

